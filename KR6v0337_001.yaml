body:
  text: 呂澄引言唯識有古今學非徒立説先後精粗之別已也傳習根本諸論又各異文焉此説證之我國新舊諸譯而信證之西藏新譯亦信今得親接梵本乃尤信傳世親唯識論者舊稱十大師然唯護法説備東土安慧書存藏衛餘見稱引鱗爪而已安慧一家傳承更久故晚唐以後猶得流布西藏大暢厥宗三十唯識譯籍存者有本頌有釋論安慧有論疏律天備三類焉然其梵本湮沒千年不可得也四載前西紀一九二二年法人萊維重遊尼泊爾得見皇家藏書有梵文三十頌釋寫本審其題尾儼然安慧論也亟乞諸王師影寫而歸為梵學者講習於巴黎大學三年西紀一九二五年校訖附世親二十唯識論梵本亦得諸尼泊爾題成唯識合而刊行同時日人榊亮三郎亦校三十論首六葉載諸藝文雜志第十七卷第五號增田慈良又就論前序分比較梵藏漢譯著為論文載諸學苑雜志第二號於是安慧釋論原本廣播世間余亦得備致誦覽因知梵本與藏譯最近據萊維校刊梵本第六七頁多有缺文餘與藏譯出入甚微所據本頌文意大同獨與唐譯時相徑庭終不可合古今學異文之説於此乃定讞也至於循釋通頌比較研求復備數益焉其一得以窺見安慧所傳本頌之特徵也西方造頌撮要填詞每每文言簡拗尋解遊移長行分疏而後楷定是為訓釋西方造論逐本著文隨標隨釋常不別舉全文割裂意義洞然是為章句一家傳本異文之意即存於訓釋章句之間故孤頌異同無從解説有論廣成乃可知耳今由安慧釋論推頌傳本特異之處莫不瞭然是一利也萊維印本順釋所牒頌文提行排列頗醒眉目但仍有小疪應改如三十五頁第十七頌末句重提兩處又全篇引頌亦復提行皆生混淆但此猶無關文旨若我國舊譯釋論另提論本於前至於釋文標牒皆不區分因以晦失意義不少唐譯二十唯識論亦不免此誠憾事耳其二得以尋繹唐譯本頌之真相也唐譯唯識三十頌雜入科文徵起蓋是成唯識論摘出文意與護法解説最符疑即一家傳本以無佐證未能定也得安慧論而後曉然譯本之果為別傳不寧唯是憑藉梵本頌法推勘唐翻又見譯文尚不盡實所謂別本真相乃另有在焉蓋西方頌法有多體裁此三十頌用首盧迦體八言一句二句一行二行一頌用韻短長一一有則頌文隨順或省文如安慧傳本第十頌列善心所名目無捨但云俱或增字如第十七頌末句一切唯識末加是字乃足八言或倒綴名目如第十二頌六煩惱中見前於疑或多致牒言如第三四五頌解藏識凡五以彼字牒前文或成單句如解藏識有二頌三句遞至第八頌解六識遂成單句不滿一頌或有賸詞如第七頌首句末賸一餘字屬下句觸等是皆屈曲立言不能如散文之順暢至於轉譯限制五言又非恰順頌本愈違原意有如唐譯詳其所略損其遊詞順從文理釐然有式此亦便於觀覽之至也然而增損稍過面目即失其細者如第二十頌彼彼分別譯作遍計返譯梵文則多一韻不合頌法又與前後稱分別者義不相隨其甚者如第二十四頌解三無性併譯兩句不足一頌又增後由遠離前兩句返譯梵文皆成蛇足而次頌三句本解第三無性乃別科判漠不相關若是種種為例甚多譯文善巧未見其失格量梵本而知有過不可掩也必加披疏乃得異本之實則如心所中悔眠等為不定安慧本頌云悔眠亦如是此亦如是三字論無解即是餘文改為不定不破頌式又如第三能變緣境為性等安慧本云第三若六種境能緣者是多有餘詞改為性相亦不破頌式真是傳本異文耳故由安慧論格量唐譯真相乃明是二利也因此又知新譯唯識諸籍傳今學本而譯文敷衍與舊譯古本情形略同直據其文以相是非固難得其平耳其三得以推想世親本頌之原文也謂安慧所傳本頌為古學本不必即當世親原文但推想原文亦必與是最近奚以見其然也唐譯三十論以前有轉識論舊傳陳真諦譯即三十頌一家之釋譯義雖多乖違但依安慧論勘此釋應在前出安慧論每云復次即存舊説轉識論所解數見安慧論復次文中其為前出之作可知所釋本頌必近原文今以安慧頌本相較如出一手若第七識思量為性唐譯本乃云性相餘觸等是餘之觸唐譯本餘作實字乃可云餘及觸悔眠等是隨惑唐譯本乃作不定出世智無能緣心唐譯本乃作不思議為例皆同從可知安慧本之近於原文也復次釋原文者異義紛披勢必原文涵此種種契機乃有生發今即準此勘安慧本如第六頌一家解末那與四惑相應又是無覆無記轉識論此必原本四惑與無覆無記相次為文乃有此解勘安慧本云云則恰合也唐譯本乃出無覆無記於後又如第十頌一家異解善心所但有十種此必原本名數不全乃生此説勘安慧本云云又恰合也唐譯本具出行捨名目善法十一即不容異解又如第二十頌一家解所分別境是無體故成唯識成唯識論卷八又轉識論此必原本無字可承所分別言乃生此解勘安慧本云云又恰合也唐譯本所分別下云由此彼皆無義勢則隔今世親三十頌原本雖不可見得安慧本想像髣佛此三利也其四得以探求世親頌文之古義也如上辨析古今傳本不同非僅備文字考訂而已竊謂理解所資文義相涉非見古本亦不得古義也余非偏愛於古治此學多年出入注疏倣徨旁論繁瑣附益之説備為困縛而後痛感有直探驪珠之要捨是則治絲愈棼也注疏之説條理細微是其所勝而懸想之談每每掩其精采如成唯識論糅十家之書者也於十家説即應有辨乃疏家時稱難陀云云今勘多出安慧其間是否相因雖不可知然如舊説則失之安慧也又每稱安慧云云今按多得其反如説見相分是遍計安慧但言分別所取二取遍計不説見相也餘有多處勘文可知大處已乖釋文尤甚如三類識變本指其事解為能變則屬法體以至因果二變釋意糾紛卒不可解勘下出安慧論文短長自辨是其辭愈繁而意愈蔽安所得頌本義乎又旁論推徵是護法説精華所寄今以安慧論勘成唯識大抵釋文十同五六其他異義多在旁論如種子如四分如三依如四緣安慧論不一言蓋皆其後出也論以明頌不得本義則偏詳旁論猶病流漫况復注疏曼衍其辭者乎故治此學應知本即非明古義不為功也安慧論釋不繁堅守家法如釋識變則從中邊釋心所則從集論五薀釋三性又從攝論理解一貫古義之説其在茲乎嗚乎無著世親之學亦久蔽矣唐疏復興啓迪甚盛然而有志之士研鑽莫入每望望然去之雖不敢菲薄精深但云繁奧難解耳夫以繁難為精深此學不將愈晦歟今謂古疏之説應別為唐人學治之若明西土論書則必由古義直接得之有安慧論啓此端緒是四利也茲篇抄譯安慧釋論以明本頌為主出其訓釋章句達意而止餘悉從略頌文對校梵藏翻譯釋論多依藏譯內院樹因研究室藏本安土版以其譯意更明暢也此皆講次所出未暇覆勘脫誤不免願識者指正之三十唯識釋阿闍黎安慧造為使迷謬人法無我者正解人法無我故創茲三十唯識論此中使解人法無我者為斷煩惱及所知障故如是貪等諸煩惱由我見生起故人無我對治薩迦耶見彼斷則一切煩惱斷法無我對治所知障彼障則斷使斷煩惱及所知障者為得解脫及一切智故諸煩惱障得解脫故斷彼則證解脫所知障是諸染污無知於一切所知中礙彼智轉故斷彼則一切所知無著無礙智生證一切智復次執人法者不能正知唯心為使解人法無我次第得入一切唯識故創茲論復次或執所知如識亦有實體或執識如所知世俗雖有勝義則無遮茲偏執故創茲論施設我及法各別種類起具足應言於世間及論議中有各別種類彼皆由識變此貫初句施設我及施設法是為施設我法言各別種類者謂有多種若我命者生者等是施設我若諸蘊界處色受想等是施設法兩類施設皆以識變為性非有實體離識變外無諸我法故變謂變異若因剎那滅同時成就與彼不離果性是為變此中由我等分別色等分別攝植習氣故從藏識生起分別現似我等色等此中雖無外我外法而由分別似外無始時來施設我法而轉譬如翳目見髮繩等言施設者謂於彼處施設所無為有是故識自性外無諸我法此等即遍計性勝義無有但為施設所依識變自性不無未知識變復有幾種今分別説故云此變又三類第一頌若處施設我法復有因性果性不同此中因變者謂即藏識中異熟等流習氣滋長果變者謂由宿業招引圓滿異熟習氣得起而有餘生藏識現行又等流習氣得起而有轉識染污意及藏識現行此中由善不善轉識於藏識中生異熟習氣由無記轉識及染污意生等流習氣又復未知三類是何今分別説故云異熟與思量及於境了別彼三類變所謂異熟所謂思量所謂於境了別此中善不善業習氣成熟力故引果現行是為異熟又染污意以常時思量為性是曰思量六識各別現似色等境界是為於境了別是等自性是何以次當説故云此中名藏識異熟一切種第二頌云此中者次前所説三類變中云名藏者謂即名彼藏識即彼識為異熟變彼是一切雜染種子所依為藏云藏云依異門施設復次此中攝藏一切法為果性一切法中攝藏此為因性故名為藏了別為識於一切界趣生類中由善不善業成熟為異熟一切法種子所依為一切種若轉識外別有藏識應説所緣及行相無所緣行相不成識故此雖不無然不可分別所以者何藏識內有執受了別外有行相不斷器界了別兩類生起此中內執受者謂愛著遍計性者習氣及所依身俱有諸根名色彼為所緣甚微細故不可知執受彼及處了別藏譯順釋作彼執受及處了別不可知執受何等不可知又依處了別不可知故是為藏識執受及處不可知此中執受者謂所執受亦即我等分別習氣及色等法分別習氣藏識有彼習氣故乃執受我等分別色等分別故名彼諸分別習氣以為執受於此受此不可知故説彼執受不可知處了別者謂器世間分別彼亦難知又復行相不斷而起故説不可知如是此識所緣行相不斷而起入滅盡定時亦成就此故由如是説藏識決定是識必與心所相應應説此心所是何等復有幾種又得常時相應否耶故云常與觸作意取想思相應第三頌云常者謂藏識恆時與彼觸作意受想思五遍行法相應頌中取即是受此中觸者由三和合分別諸根變異是受所依為業作意者令心生起於所緣持心為業受者領納自相想者於境取相思者令心造作受有三種樂苦不苦不樂法有四種善不善有覆無記無覆無記藏識中受上雖已説未知是三種中何受又是善不善何等了決此義故云於彼是捨受彼無覆無記云於彼者貫彼藏識自相即彼藏識受是捨性非樂非苦此二受所緣行相有間斷故云彼無覆無記者亦貫藏識云無覆者簡別有覆無記故云無記者簡別善不善故不由意雜染心所覆故説為無覆是異熟所成故説為無記觸等亦如是如彼藏識是異熟所緣行相不可分別常與觸等相應為捨受性及無覆無記如是觸等亦復是異熟所緣行相不可分別常與自餘四法及藏識相應又捨受性及無覆無記皆如藏識諸相應法應爾故説亦如是彼藏識流轉中恆無異耶或復不爾應説一類無異故云彼流如瀑水第四頌云彼者貫上藏識流者因果相續成流水聚續流不斷是為瀑水如彼水與草木便溺俱流如是藏譯成就福非福不動諸業習氣又攝觸作意等法恆時輪轉不斷成流如是流轉何時得捨故云羅漢位捨彼羅漢位謂得盡智無生智彼藏識中粗重無餘斷故則成捨彼藏識亦即彼時為阿羅漢異熟變已釋訖今説第二思量變故云依彼而生起等如彼眼等識眼等為依色等為緣則已共知今染污意依緣未知是何決定説彼故云依彼而生起緣彼名為意識思量為性第五頌依彼彼聲貫上藏識藏識是彼習氣所依故依彼俱起意謂相續而生復次隨一界地藏識得異熟時染污意亦即是彼界地依藏識而轉故為依彼起云緣彼者即緣藏識謂與薩迦耶見等相應緣彼藏識以為是我故是名為意之識者依緣藏識之識説名為意簡別轉識及與藏識次復説彼自相故云思量為性是由訓釋言詞説意既是識性應與心所相應未知何等心所何時相應故云與四煩惱俱常有覆無記藏譯順釋意譯云與有覆無記四煩惱常俱心所有二類煩惱及餘此中簡餘故説煩惱煩惱又有六彼非一切相應故説四云俱者即是相應煩惱復有二類不善及有覆無記簡別不善故云有覆無記有覆識不能與諸不善法相應彼染污即是覆故云常者謂一切時乃至有彼即與此等相應前説差別未知故云謂我見我癡又我慢我愛第六頌於諸取蘊觀我是為我見意謂薩迦耶見癡者無知於我無知是為我癡我慢者緣我心傲意謂七慢中我慢我愛者於我貪著意謂我貪此中迷惑藏識自性我癡則於彼識有我見生由此心傲而為我慢由此三故貪著樂欲我體是為我貪如有頌言此我癡等諸煩惱亦如彼意有九地未知是彼自性相應或復與餘相應故云隨生是云隨生者謂隨所起處云是者隨所生何界何地即惟與彼界地相應非與其餘然亦非説唯與四煩煩惱相應復云及餘觸等相應云及者總攝之義云觸等者謂觸作意受想思五遍行法與一切識相應此等亦隨所生處即與彼界地相應非餘界地復次言餘者簡別諸與本識相應者故根本識觸等無覆無記此則有覆若染污意善染無記等時悉無差別而轉彼則無捨云何不成不能解脫此亦不爾故云羅漢無滅盡定中無出世道亦無第七頌羅漢於煩惱無餘永斷故無有染污意又以滅方便力得滅盡定亦如方便無彼意起出定時乃從藏識復生出世者簡別世間故世間道起染污意若觀無我為我見對治為出世道彼不能起由道出時復從藏識而生是為第二變廣釋已訖如是結成第二變後應説第三變故云第三於六境若能緣者是第三者具足應言識變云六者六種即色聲香味觸法自性境若能緣彼境者意謂能取及分別此復是善不善或無記耶故云善不善俱非第八頌言俱非即無記此若與無貪無瞋無癡相應則善與貪瞋癡相應則不善非與二相應者則俱非意謂非善亦非不善附記日人寺本婉雅最近重校藏文三十頌載於佛教研究七卷三號謂頌善不善俱非下原缺一句應據釋補云非有無貪按原頌單句係因前文遞次而然本無所缺安用其補且所補云云隨意連綴勘梵藏兩本論文毫無所據又藏譯頌皆七言一句今補乃有八字亦非程式種種乖違不可置信又其本餘頌亦謬誤多端不勝指摘彼復何類心所相應又各有幾故云遍行決定別及善心所法彼相應煩惱隨煩惱三受第九頌藏譯云三受彼相應遍行等未知是何由是顯示故云第一是觸等最初説故是為第一即彼遍行如前廣説常與觸作意等彼觸為首故云觸等此等五法遍行於一切心故名遍行如是於藏識染污意及諸轉識無差別而起次及定別故云欲勝解念俱定慧為定別於差別中決定是為定別彼等境界皆是有差別性非是一切此中欲者於所願事樂欲勤依為業勝解者於決定事定執如彼不可移轉為業念者於所習事不忘明記心不散亂為業定者於觀察事心集一性智依為業慧即是智此亦於觀察事簡擇理非理等離疑為業釋諸定別已訖次復應説善等故云信及與慚愧第十頌無貪等三勤輕安不逸俱不害善具足應言此等有十一法此中信者於諸業果諦寶德能等忍可心淨希求欲樂所依為業慚者依自及法力故羞畏罪過善滅惡行所依為業愧者依世間力羞畏罪過業同慚説無貪是貪對治貪謂遍貪樂著有及有具彼對治為無貪無瞋是瞋對治故於有情諸苦及苦依處心能堪忍無癡是癡對治癡謂於諸業果諦寶無知彼對治為無癡此三法皆以惡行不轉所依為業勤者怠惰對治於善策心此能圓滿及成就善品為業輕安者所依惡損對治身心安適性由彼力故轉依離煩惱盡為業不逸俱者不逸及所俱法俱善性故未顯説故無餘善法故應知所俱説捨此中不逸是放逸對治無貪至精進中為不逸能圓成世出世一切勝善為業捨者心平等性平靜性及無功用性一切煩惱隨煩惱不起所依為業不害者損害對治不由殺縛等損有情是為不害即不損惱為業釋十一善已訖次復説諸煩惱故云煩惱謂欲貪瞋癡第十一頌及與慢見疑欲貪及瞋及癡故云貪瞋癡此中貪者於諸有及受用果貪著樂欲一切苦生為業瞋者於諸有情損惱不安樂住及惡行所依為業癡者於諸苦樂正因果一切無知雜染生起所依為業慢者一切依薩迦耶見而起心傲為性不敬及苦生所依為業見者上雖已釋但此屬煩惱見唯彼五種煩惱為自性者謂薩迦耶見等世間正見等非此所攝釋六煩惱已訖藏譯論文於此分卷上第一卷訖下題後第二卷但梵本不分次後釋諸隨煩惱故云復次忿及恨覆惱及與嫉慳及與諂俱第十二頌誑憍及與害無慚愧惛掉不信及懈怠放逸及忘念第十三頌散亂不正知悔眠亦如是又尋及與伺隨惑二各二第十四頌此中忿者依於現前損惱心怒割截等所依為業恨等體業文繁不具出於惡作境心不喜樂是心所位説名為悔損害心所依為業眠者不自在轉心略轉謂轉於所緣此是癡分損害所作所依為業尋者遍尋求意言是慧及思差別遍尋求者謂起分別此是何等意言者是意之言與言相似即境義言伺亦是慧思差別性各別分別意言於前所習説為是此故是以亦名心細尋伺二者皆以安住不安住所依為業云二各二者二種二各有二即悔眠二與尋伺二彼四法皆二類染與非染此中若已作善心悔未作不善是染污悔反此非染如是眠等皆分別説此中染污悔眠尋伺為隨煩惱非是其餘此中如彼色聲等六種能緣與諸遍行等一切心所隨應相應如是亦與樂苦不苦不樂三受相應由樂意不樂意及俱非色聲等起故又與善不善無記相應或作是計眼識等五同時遇所緣緣但從藏識生起一識非二非多無彼無間緣故一識不能為多緣故此亦不定若遇一緣則唯起一遇二及多亦得起多故云諸五依本識隨緣而生起識或俱或否如諸波依水第十五頌諸五者謂眼等諸識又次後諸與意識俱者藏識是諸五識種子所依能生起彼又生諸趣能執受故名根本識云隨緣者遇彼彼緣即彼彼識得生起者成就云或俱或否者謂同時或次第云如諸波依水者依於藏識生諸轉識或俱或否如經云廣慧譬如大河水流若有一浪生緣現前則一浪起若二若三若多生緣現前則多浪起如是廣慧即彼流轉藏識為依止故若眼識等一生緣現前則一眼識起乃至廣説見解深密經今復當説彼意識者必與眼等識俱起或無彼時亦得生起故云意識生起者是常除無想及二種等至無心眠及悶第十六頌云常者一切時意謂與眼等識或俱或否但除彼諸違緣無想等此中無想者謂生彼無想諸有情中心心所法一切皆滅二種等至者無想等至及滅盡等至無想等至者已離第三靜慮貪猶起上貪出離想作意為先意識及彼相應諸心所皆滅是為無想等至滅盡等至者已離無所有貪以安靜想出離作意為先意識及染污意諸相應皆滅此亦如無想説依及位差別無心眠者所依不適覆心故乃至彼位意識不起名為無心又無心悶者卒然風痰等不平等為依意識不起為無心悶除彼等五位應知意識一切時起於彼識變施設我法此有三類廣釋已訖彼起我法施設者既識變為性是我與法離識變外應皆無有今成此義故云即彼識變是分別所分別彼無故由此一切是唯識第十七頌如次上釋三種識變即是分別云分別者增益義相三界心心所法如中邊論説虛妄分別者三界心心法由彼藏識等三種分別自性及相應法有所分別若器若我若色聲等彼等體性是無故説是識變分別所緣是無故謂惟因緣或順或違而起此外無有廣説乃至增益性故應知識所緣是無復欲離增損兩邊故説由此一切是唯識云由此第三轉聲者即是此故第五轉聲如彼轉變自性分別彼所分別是無此則無境故一切是唯識一切謂三界及無為唯聲意在遣心外境云是者填頌之辭若一切唯識無別作者能作云何根本識無能作諸分別得生是故説云一切種子識如是如是變由展轉力故彼彼分別生第十八頌藏譯順釋顛倒第二三句此中成就生一切法功能是為一切種子識者藏識以有識而非一切種故説一切種子又為分別一切種而非識故復云識言如是如是變等者從前藏識位而有變異是為變如是如是意説成就彼分別及後生起功能位言展轉力者如彼眼等識為熏各自功能而轉則為藏識功能差別之因即彼藏識變時又為眼識等因是為由展轉力兩俱起故不待外力亦有彼彼多種分別得生此則已説現時藏識如何生起轉識現在既滅應説未來云何相續故云諸業習氣與二取習氣俱前異熟既盡彼餘異熟生第十九頌福非福及不動思是為業若由彼業為成未來自體於藏識中生起功能是為業習氣二取者所取取及能取取此中深著離識別有所取自類相續而住是為所取取若復決定取著由識了知分別是為能取取前能所取熏習起彼當來二取種子是為二取習氣此中由業而有各別異趣自體由二取習氣有自體生時諸俱有法如是非獨由業習氣能生異熟故説二取習氣俱言前異熟既盡等者前所集業異熟既已現行由餘業力又與二取習氣俱所餘異熟即彼藏識又生離藏識外無別異熟故説前異熟盡則遣常邊餘異熟生則遣斷邊若此等是唯識者經説有遍計依他圓成三種自性云何不與相違即於唯識性中安立三性故亦不違此復如何故云由彼彼分別分別彼彼事即彼是遍計自性彼無有第二十頌顯示內外諸事差別無邊分別故説由彼彼分別云分別彼彼事者即內外事在佛法中此皆遍計自性説此因故云彼無有分別境界諸事由無自體為無是以彼事唯是遍計自性非依因緣自性次遍計後當釋依他故云依他自性者分別由緣起云分別者此説依他自體云由緣起者是説依他得名所由此中分別即是諸善不善無記各別三界心心所如前所説皆依因緣他增上故為依他意謂所生依於自餘諸因緣法而得生故釋依他訖圓成如何故云成者即於彼前者常離性第二十一頌由不變異是為圓成云於彼者謂依他性云前者者謂遍計性遍計能所取體是無有於依他中常一切時遠離此者為圓成性故此與依他非異非不異云故此者依他與遍計常離是為圓成此常離性即法性法性與法不可言異非異圓成是依他法性故應作是觀若相異者依他應不能離遍計成空若非異者圓成又不能成清淨所緣依他是雜染自體故説如無常等具足應言亦異亦非異譬如無常性苦性無我性與無常等非異非不異若能取所取是無依他起有執無執云何分別故云此不見彼昧第二十二頌云此不見者謂圓成性云彼昧者謂依他性圓成性是出世智無分別現觀言不見者即未無分別現觀依他性是由此後得世出世智所取故不見圓成即昧依他若依他是實性者云何經説一切法無自性不生不滅此亦不違故云依三自性之三種無自性密意故説言一切法無性第二十三頌自性唯三故説彼數各自有其相現是為自性三種無自性者相無自性生無自性及勝義無自性一切法者即遍計依他圓成自體之法今説三自性無何種自性故云第一者由相無自性餘復由非自生起為餘無自性第二十四頌彼諸法勝義彼亦是如性第一者遍計自性彼由相無自性相是分別故如説色相有礙受者領納等皆無自體猶如空華云餘復者依他自性彼如幻等由他緣生故無自性又現似如彼實不如彼生故為生無性云彼諸法勝義等中勝謂出世智彼無上故彼義亦為勝復次猶如虛空一切一味無垢不變法是圓成説為勝義如是圓成自性是依他自體一切法之勝義為彼法性故即是勝義無自性圓成為無性之自性故豈唯勝義説圓成耶不爾彼亦是如性亦聲表非獨説如性亦應説法界等一切一切時皆爾即彼如性異生有學及無學位中一切時皆如彼由不變異説為如性為即彼如性圓成是唯識性或復有餘唯識性耶故云此即唯識性第二十五頌由此言説現觀若此等亦是唯識彼眼耳等取色聲等心由何起故云若於唯識性識未依住時彼二取隨眠爾時則未遣第二十六頌復次前説諸業習氣與二取習氣俱等彼遣不遣其如何等故今説頌云云按此是另一章句若時識未依住於心法性所謂唯識性者爾時猶緣所取能取二取者所取取及能取取彼隨眠者為生未來二取攝藏於藏識之種子乃至瑜伽師心未轉依於無二相唯識性彼時二取習氣未遣意即未斷此中顯示外所得未斷故內所得未斷乃作是計我由眼等取色等今復應言離境有唯心可得即住於心法性唯識性耶不爾設想唯識性如是有所得隨應現安立彼未住唯識第二十七頌復次為對治慢心惟有所聞即計已住故頌云云此中云唯識性者遣境謂無外境如是有所得者意謂能取及能相現者現前安立者即隨所聞由意安立謂瑜伽師多種所緣中隨應取一如白骨青瘀等彼未住唯者未斷識有所得故何時則斷識能取而住心法性耶故云若時識所緣都無得爾時住唯識所取無故能取無第二十八頌若時於言説所緣乃至色聲等自性所緣隨一知為識外不可得一無所著如是實見不同生盲此時識能取亦斷而住自心法性説此因云所取無故能取無有所取則起能取無所則無餘能取如是於能所取無分別平等出世智起二取愛著即二取取隨眠則斷而於自心法性亦得轉依若心轉依於唯識性時復如何等故云彼無思無得亦出世間智彼依復異轉斷二粗重故第二十九頌彼即無漏界不思議善堅彼樂解脫身名大牟尼法第三十頌此二頌説依瑜伽道入唯識性漸次勝進得圓滿果此中無能取思惟亦無所取義可得故説彼無思無得無戲論集起分別超出世間故為出世間智彼智後説轉依故云彼依復異轉依者藏識一切種轉者一切粗重異熟及二習氣體轉為正受法身及無二智體彼轉依復由斷何而得耶故説斷二粗重故所謂二者煩惱障粗重及所知障粗重粗重者即所依不正受性亦即二障種子又彼轉依有斷聲聞所有粗重而得者是曰解脫身斷菩薩所有粗重而得者是曰名牟尼法由斷二種障差別説轉依有上或無上由煩惱障縛聲聞所知障縛菩薩斷是等則得遍知性云彼即無漏界者謂轉依自性是無漏及界無粗重故離一切漏是為無漏聖法之因是為界界聲因義不思議者非分別所行境各別證知又無喻故善者清淨所緣安樂及無漏法之自性故堅者常不滅故樂者常性故若無常則苦此常故樂由斷煩惱障為諸聲聞解脫身彼轉依相為名大牟尼法身若由地度及定斷所知障轉依真實故名大牟尼法身不流轉無煩惱得一切聖財故名為菩薩法身云大牟尼者覺者成就最勝為佛世尊是大牟尼附記西藏譯三十頌本一種亦勝友等譯亦存安慧之説本刊第一輯中已為重譯矣但對勘此論引文乃見其中錯誤凡有多處藏譯中頌本與釋論參差者時常見之自宜依釋訂正不容異説今不詳舉作者識
